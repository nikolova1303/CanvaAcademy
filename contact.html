<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакти - Canva Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== ОСНОВА ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* ===== ФОН ===== */
.background{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:
radial-gradient(circle at 20% 20%,#00c4cc55,transparent 25%),
radial-gradient(circle at 80% 40%,#8b5cf655,transparent 25%),
radial-gradient(circle at 50% 80%,#06b6d455,transparent 25%);
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

/* ===== NAV (hide on scroll) ===== */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
background:rgba(15,23,42,.9);
backdrop-filter:blur(10px);
z-index:1000;
transition:transform 0.3s ease, opacity 0.3s ease;
}

nav.hide{
transform:translateY(-100%);
opacity:0;
}

.logo{
font-size:24px;
font-weight:700;
color:#00c4cc;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:80px 20px 30px 20px;
}

.hero h1{
font-size:3rem;
}

.hero span{
color:#00c4cc;
}

.hero p{
opacity:.8;
margin-top:10px;
}

/* ===== CONTAINER ===== */
.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* ===== FORM CARD ===== */
.form-card{
background:rgba(30,41,59,0.9);
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
transition:0.4s;

opacity:0;
transform:translateY(40px);
}

.form-card.show{
opacity:1;
transform:translateY(0);
}

.form-card:hover{
transform:translateY(-5px);
}

/* ===== INPUTS ===== */
input,textarea{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
outline:none;
transition:0.3s;
border:1px solid transparent;
}

input:focus,textarea:focus{
border:1px solid #00c4cc;
box-shadow:0 0 10px #00c4cc55;
}

/* ===== BUTTON ===== */
button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00c4cc,#8b5cf6);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* ===== SUCCESS MSG ===== */
.success{
display:none;
text-align:center;
margin-top:20px;
color:#22c55e;
}

/* ===== ANIMATION ===== */
.hidden{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

/* ===== MOBILE ===== */
@media (max-width:1024px){
.section{padding:80px 6%;}
}

@media (max-width:768px){

nav{
flex-direction:column;
gap:10px;
text-align:center;
}

nav a{
margin-left:0;
padding:5px 10px;
}

.hero h1{
font-size:2.2rem;
}

.container{
padding:10px;
}

.form-card{
padding:25px;
}
}

@media (max-width:480px){
.hero h1{font-size:1.8rem;}
.logo{font-size:22px;}
}

</style>
</head>

<body>

<div class="background"></div>

<nav>
<div class="logo">Canva Academy</div>

<div>
<a href="index.html">Начало</a>
<a href="courses.html">Курсове</a>
<a href="about.html">За нас</a>
</div>
</nav>

<section class="hero hidden">

<h1>Свържи се с <span>нас</span></h1>

<p>Ще отговорим възможно най-бързо 🚀</p>

</section>

<div class="container">

<div class="form-card hidden">

<form id="contactForm">

<input type="text" placeholder="Вашето име" required>

<input type="email" placeholder="Вашият имейл" required>

<textarea rows="6" placeholder="Вашето съобщение..." required></textarea>

<button type="submit">Изпрати съобщение</button>

</form>

<div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
    <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px;">Или ни пиши директно тук:</p>
    <a href="https://www.instagram.com/canva.academy.bg?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" style="display: inline-block; width: 100%; padding: 15px; border-radius: 12px; background: #e1306c; color: white; text-decoration: none; font-weight: 600; text-align: center; transition: 0.3s; box-shadow: 0 4px 15px rgba(225, 48, 108, 0.3);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        📸 Пиши ни в Instagram
    </a>
</div>

<div class="success" id="success" style="margin-top: 20px;">
✔ Съобщението е изпратено успешно!
</div>

</div>

</div>

<script>

/* scroll animation */
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".hidden").forEach(el=>{
observer.observe(el);
});

/* NAV hide on scroll */
let lastScroll = 0;
const nav = document.querySelector("nav");

window.addEventListener("scroll", () => {
const currentScroll = window.pageYOffset;

if(currentScroll > lastScroll && currentScroll > 80){
nav.classList.add("hide");
}else{
nav.classList.remove("hide");
}

lastScroll = currentScroll;
});

/* fake submit */
document.getElementById("contactForm").addEventListener("submit",function(e){
e.preventDefault();
document.getElementById("success").style.display="block";
this.reset();
});

</script>

</body>
</html>
